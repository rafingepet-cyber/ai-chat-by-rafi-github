<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RFChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #0a0a0f; --bg2: #12121a; --border: #27273a; --text: #e2e8f0; --text2: #a1a1aa; --muted: #71717a; --primary: #25d366; --primary2: #128c7e; }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

        .app { display: flex; height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 350px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-status { font-size: 11px; color: var(--primary); display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; }

        .search-box { padding: 12px 16px; }
        .search-box input { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 14px; outline: none; }
        .search-box input::placeholder { color: var(--muted); }

        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 14px 16px; display: flex; gap: 12px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid rgba(39,39,58,0.5); }
        .chat-item:hover, .chat-item.active { background: rgba(99,102,241,0.1); }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .chat-avatar.group { background: linear-gradient(135deg, #25d366, #128c7e); }
        .chat-avatar.owner { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .chat-details { flex: 1; min-width: 0; }
        .chat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
        .chat-bottom { display: flex; justify-content: space-between; align-items: center; }
        .chat-preview { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .chat-badge { background: var(--primary); color: white; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; margin-left: 8px; }
        .chat-check { color: var(--primary); font-size: 14px; margin-left: 4px; }

        .fab { position: absolute; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); border: none; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(37,211,102,0.3); display: flex; align-items: center; justify-content: center; z-index: 10; }

        /* OWNER TOOLS */
        .owner-tools { padding: 12px 16px; border-bottom: 1px solid var(--border); background: rgba(245,158,11,0.1); }
        .owner-tools h4 { font-size: 12px; color: #f59e0b; margin-bottom: 8px; text-transform: uppercase; }
        .btn-broadcast { width: 100%; padding: 10px; background: linear-gradient(135deg, #f59e0b, #d97706); border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; font-size: 13px; }

        /* MAIN CHAT */
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }

        .chat-header { padding: 12px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .back-btn { display: none; width: 36px; height: 36px; border-radius: 50%; background: var(--ai-bg); border: none; color: var(--text); font-size: 18px; cursor: pointer; }
        .header-info { flex: 1; }
        .header-name { font-size: 16px; font-weight: 600; }
        .header-status { font-size: 12px; color: var(--muted); }
        .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
        .msg { display: flex; max-width: 75%; animation: msgIn 0.2s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg.received { align-self: flex-start; }

        .msg-bubble { padding: 8px 12px; border-radius: 16px; font-size: 14px; line-height: 1.5; position: relative; max-width: 100%; word-break: break-word; }
        .msg.sent .msg-bubble { background: linear-gradient(135deg, #005c4b, #025144); color: white; border-bottom-right-radius: 4px; }
        .msg.received .msg-bubble { background: var(--bg2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg-bubble.broadcast { background: linear-gradient(135deg, #f59e0b, #d97706) !important; }

        .msg-meta { display: flex; align-items: center; gap: 4px; margin-top: 2px; justify-content: flex-end; }
        .msg-time { font-size: 10px; opacity: 0.7; }
        .msg-check { font-size: 12px; }
        .msg-check.read { color: #53bdeb; }

        .day-label { align-self: center; background: var(--bg2); padding: 6px 16px; border-radius: 20px; font-size: 12px; color: var(--muted); margin: 8px 0; }
        .typing-indicator { align-self: flex-start; display: flex; align-items: center; gap: 8px; padding: 8px 16px; }
        .typing-indicator.hidden { display: none; }
        .typing-bubble { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; display: flex; gap: 4px; }
        .typing-bubble span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-bubble span:nth-child(1) { animation-delay: -0.32s; }
        .typing-bubble span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* INPUT */
        .input-area { padding: 12px 16px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-end; }
        .input-box { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 24px; padding: 10px 16px; display: flex; align-items: center; }
        .input-box input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 15px; outline: none; }
        .input-box input::placeholder { color: var(--muted); }
        .btn-send { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-send:disabled { background: var(--bg2); color: var(--muted); cursor: not-allowed; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; }
        .modal h3 { font-size: 18px; margin-bottom: 16px; }
        .modal textarea { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); margin-bottom: 12px; font-size: 14px; resize: none; min-height: 80px; }
        .modal input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); margin-bottom: 12px; font-size: 14px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-cancel { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .btn-confirm { background: var(--primary); color: white; }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 100%; z-index: 100; }
            .sidebar.hidden { transform: translateX(-100%); }
            .back-btn { display: flex; }
            .fab { bottom: 80px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-avatar" id="myAvatar">👤</div>
                <div class="user-info">
                    <div class="user-name" id="myName">User</div>
                    <div class="user-status">
                        <span class="status-dot"></span> Online
                    </div>
                </div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Cari chat..." id="searchInput">
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('private')">Pribadi</div>
                <div class="tab" onclick="switchTab('group')">Grup</div>
            </div>
            
            <!-- Owner Tools -->
            <div class="owner-tools" id="ownerTools" style="display:none;">
                <h4>👑 Owner Tools</h4>
                <button class="btn-broadcast" onclick="showBroadcast()">📢 Broadcast ke Semua</button>
            </div>
            
            <div class="chat-list" id="chatList"></div>
            <button class="fab" onclick="showNewChat()" id="fabBtn">+</button>
        </div>

        <!-- MAIN CHAT -->
        <div class="main">
            <div class="chat-header">
                <button class="back-btn" onclick="showSidebar()">←</button>
                <div class="header-avatar" id="headerAvatar">👤</div>
                <div class="header-info">
                    <div class="header-name" id="chatName">Pilih Chat</div>
                    <div class="header-status" id="chatStatus">-</div>
                </div>
            </div>
            <div class="messages" id="messages">
                <div class="day-label">Pilih chat untuk memulai</div>
            </div>
            <div class="typing-indicator hidden" id="typingBox">
                <div class="typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            </div>
            <div class="input-area">
                <div class="input-box">
                    <input type="text" id="msgInput" placeholder="Ketik pesan..." autocomplete="off">
                </div>
                <button class="btn-send" id="sendBtn" onclick="sendMsg()" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22,2 15,22 11,13 2,9 22,2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL NEW CHAT -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle">Chat Baru</h3>
            <input type="text" id="modalInput" placeholder="Nomor WA (628xxx)">
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Batal</button>
                <button class="modal-btn btn-confirm" onclick="confirmNewChat()">Chat</button>
            </div>
        </div>
    </div>

    <!-- MODAL BROADCAST -->
    <div class="modal-overlay" id="broadcastModal">
        <div class="modal">
            <h3>📢 Broadcast Message</h3>
            <textarea id="broadcastText" placeholder="Ketik pesan broadcast..."></textarea>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeBroadcast()">Batal</button>
                <button class="modal-btn btn-confirm" onclick="sendBroadcast()">Kirim ke Semua</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>

    <script>
        // ===== INIT =====
        initFirebase();
        if (!checkAuth()) {
            window.location.href = 'index.html';
        }
        
        setOnline();
        
        // Show owner tools
        if (isOwner()) {
            document.getElementById('ownerTools').style.display = 'block';
            document.getElementById('myAvatar').classList.add('owner');
        }
        
        document.getElementById('myName').textContent = currentUser.name;
        
        // ===== STATE =====
        let currentTab = 'private';
        let chats = [];
        let messages = [];
        
        const chatList = document.getElementById('chatList');
        const messagesBox = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // ===== EVENTS =====
        msgInput.addEventListener('input', () => {
            sendBtn.disabled = !msgInput.value.trim();
        });
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
        
        // ===== LOAD CHATS =====
        function loadChats() {
            db().ref('userChats/' + currentUser.uid).on('value', (snap) => {
                const data = [];
                snap.forEach(child => {
                    data.push({ id: child.key, ...child.val() });
                });
                chats = data.sort((a, b) => (b.lastTime || '').localeCompare(a.lastTime || ''));
                renderChatList();
            });
        }
        
        function renderChatList() {
            if (!chats.length) {
                chatList.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">Belum ada chat</div>';
                return;
            }
            
            const filtered = chats.filter(c => currentTab === 'group' ? c.type === 'group' : c.type !== 'group');
            
            chatList.innerHTML = filtered.map(chat => `
                <div class="chat-item ${chat.id === currentChat ? 'active' : ''}" onclick="openChat('${chat.id}', '${chat.name}', '${chat.type || 'private'}')">
                    <div class="chat-avatar ${chat.type === 'group' ? 'group' : ''} ${chat.isOwner ? 'owner' : ''}">
                        ${chat.type === 'group' ? '👥' : (chat.isOwner ? '👑' : '👤')}
                    </div>
                    <div class="chat-details">
                        <div class="chat-top">
                            <span class="chat-name">${escapeHtml(chat.name)}</span>
                            <span class="chat-time">${chat.lastTime || ''}</span>
                        </div>
                        <div class="chat-bottom">
                            <span class="chat-preview">${escapeHtml(chat.lastMsg || 'Belum ada pesan')}</span>
                            ${chat.unread ? `<span class="chat-badge">${chat.unread}</span>` : ''}
                            ${chat.lastRead ? '<span class="chat-check read">✓✓</span>' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // ===== SWITCH TAB =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderChatList();
        }
        
        // ===== OPEN CHAT =====
        function openChat(chatId, name, type) {
            currentChat = chatId;
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }
            
            document.getElementById('chatName').textContent = name;
            document.getElementById('headerAvatar').textContent = type === 'group' ? '👥' : '👤';
            
            // Listen status
            if (type !== 'group') {
                const partner = chatId.replace(currentUser.uid, '').replace('_', '');
                db().ref('users/' + partner + '/status').on('value', snap => {
                    const status = snap.val();
                    document.getElementById('chatStatus').textContent = status === 'online' ? '🟢 Online' : '⚪ Offline';
                });
            } else {
                document.getElementById('chatStatus').textContent = '👥 Grup Komunitas';
            }
            
            // Listen messages
            if (messagesRef) messagesRef.off();
            messagesRef = db().ref('messages/' + chatId);
            messagesRef.on('value', (snap) => {
                const data = [];
                snap.forEach(child => {
                    data.push({ id: child.key, ...child.val() });
                });
                messages = data;
                renderMessages();
                markAsRead(chatId);
            });
            
            // Listen typing
            listenTyping(chatId, (isTyping) => {
                document.getElementById('typingBox').classList.toggle('hidden', !isTyping);
            });
        }
        
        function renderMessages() {
            if (!messages.length) {
                messagesBox.innerHTML = '<div class="day-label">Mulai chat!</div>';
                return;
            }
            
            let lastDate = '';
            messagesBox.innerHTML = messages.map(msg => {
                const date = formatDate(msg.time);
                let dayLabel = '';
                if (date !== lastDate) {
                    lastDate = date;
                    dayLabel = `<div class="day-label">${date}</div>`;
                }
                
                const isMe = msg.sender === currentUser.uid;
                const time = formatTime(msg.time);
                const isRead = msg.read || (msg.readBy && msg.readBy[currentUser.uid]);
                const checkClass = isRead ? 'read' : '';
                const isBroadcast = msg.type === 'broadcast';
                
                return dayLabel + `
                    <div class="msg ${isMe ? 'sent' : 'received'}">
                        <div class="msg-bubble ${isBroadcast ? 'broadcast' : ''}">
                            ${isBroadcast ? '<strong>📢 Broadcast</strong><br>' : ''}
                            ${escapeHtml(msg.text)}
                            <div class="msg-meta">
                                <span class="msg-time">${time}</span>
                                ${isMe ? `<span class="msg-check ${checkClass}">✓✓</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }
        
        // ===== SEND MESSAGE =====
        function sendMsg() {
            const text = msgInput.value.trim();
            if (!text || !currentChat) return;
            
            sendMessage(currentChat, text).then(() => {
                msgInput.value = '';
                sendBtn.disabled = true;
            }).catch(err => {
                console.error('Send error:', err);
            });
        }
        
        // ===== NEW CHAT =====
        function showNewChat() {
            const isGroup = currentTab === 'group';
            document.getElementById('modalTitle').textContent = isGroup ? 'Buat Grup' : 'Chat Baru';
            document.getElementById('modalInput').placeholder = isGroup ? 'Nama grup' : 'Nomor WA (628xxx)';
            document.getElementById('modal').classList.add('open');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('open');
        }
        
        function confirmNewChat() {
            const input = document.getElementById('modalInput').value.trim();
            if (!input) return;
            
            if (currentTab === 'group') {
                createGroup(input);
            } else {
                const phone = input.replace(/\D/g, '');
                const chatId = createPrivateChat(phone, input);
                db().ref('users/' + phone).once('value', snap => {
                    const name = snap.val()?.name || input;
                    db().ref('userChats/' + currentUser.uid + '/' + chatId).update({ name: name });
                });
            }
            
            closeModal();
        }
        
        // ===== BROADCAST =====
        function showBroadcast() {
            document.getElementById('broadcastModal').classList.add('open');
        }
        
        function closeBroadcast() {
            document.getElementById('broadcastModal').classList.remove('open');
        }
        
        function sendBroadcast() {
            const text = document.getElementById('broadcastText').value.trim();
            if (!text) return;
            
            broadcastMessage(text).then(() => {
                document.getElementById('broadcastText').value = '';
                closeBroadcast();
                alert('Broadcast terkirim!');
            }).catch(err => {
                alert('Error: ' + err);
            });
        }
        
        // ===== MOBILE =====
        function showSidebar() {
            document.getElementById('sidebar').classList.remove('hidden');
        }
        
        // ===== START =====
        loadChats();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Rafi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="icon">🤖</div>
                <div>
                    <h1>Rafi AI</h1>
                    <p>AI Chat Assistant</p>
                </div>
            </div>
            <button class="btn-new" onclick="createNewChat()">
                <span>+</span> Chat Baru
            </button>
        </div>
        <div class="sidebar-body">
            <p class="sidebar-label">Riwayat Chat</p>
            <div id="chatList">
                <div class="empty-text">Belum ada chat. Mulai chat baru!</div>
            </div>
        </div>
        <div class="user-box">
            <div class="user-avatar">👤</div>
            <div class="user-info">
                <div class="user-name" id="displayName">User</div>
                <div class="user-email" id="displayEmail">-</div>
            </div>
            <button class="btn-logout" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <!-- Mobile Header -->
        <div class="mobile-header">
            <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
            <div class="mobile-title">Rafi AI</div>
            <button class="mobile-new-btn" onclick="createNewChat()">+</button>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatArea">
            <div class="msg ai welcome-msg">
                <div class="msg-avatar">🤖</div>
                <div>
                    <div class="msg-bubble">
                        <h3>👋 Halo! Aku Rafi AI</h3>
                        <p>Bisa bikin kode, ngobrol, atau bantu solve problem.</p>
                        <p style="margin-top:8px; color:var(--muted);">Ketik pesan di bawah untuk mulai!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Typing -->
        <div class="typing-box hidden" id="typingBox">
            <div class="msg-avatar">🤖</div>
            <div class="typing-bubble">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Input -->
        <div class="input-wrap">
            <div class="input-box">
                <textarea id="msgInput" rows="1" placeholder="Ketik pesan..."></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22,2 15,22 11,13 2,9 22,2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // ===== CHECK LOGIN =====
        const currentUser = getCurrentUser();
        if (!currentUser) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('displayName').textContent = currentUser.username;
            document.getElementById('displayEmail').textContent = currentUser.email;
        }

        // ===== STATE =====
        let chats = [];
        let activeChat = null;
        let isLoading = false;

        const chatArea = document.getElementById('chatArea');
        const chatList = document.getElementById('chatList');
        const typingBox = document.getElementById('typingBox');
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        // ===== EVENTS =====
        input.addEventListener('input', function() {
            sendBtn.disabled = !this.value.trim();
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ===== SIDEBAR =====
        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('open');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        }

        // ===== CHAT FUNCTIONS =====
        function createNewChat() {
            const chat = {
                id: genId(),
                title: 'Chat Baru',
                messages: [],
                time: new Date().toISOString()
            };
            chats.unshift(chat);
            activeChat = chat.id;
            saveAllChats(chats);
            renderChatList();
            renderWelcome();
            input.focus();
            closeSidebar();
        }

        function selectChat(id) {
            activeChat = id;
            renderChatList();
            renderMessages();
            closeSidebar();
        }

        function deleteChat(id) {
            chats = chats.filter(c => c.id !== id);
            if (activeChat === id) {
                activeChat = chats.length > 0 ? chats[0].id : null;
            }
            saveAllChats(chats);
            renderChatList();
            if (!activeChat) {
                renderWelcome();
            }
        }

        function renderChatList() {
            if (!chats.length) {
                chatList.innerHTML = '<div class="empty-text">Belum ada chat. Mulai chat baru!</div>';
                return;
            }
            chatList.innerHTML = chats.map(c => `
                <div class="chat-list-item ${c.id === activeChat ? 'active' : ''}" onclick="selectChat('${c.id}')">
                    <span>💬</span>
                    <span class="title">${escapeHtml(c.title)}</span>
                    <button class="delete" onclick="event.stopPropagation(); deleteChat('${c.id}')">🗑️</button>
                </div>
            `).join('');
        }

        function renderWelcome() {
            chatArea.innerHTML = `
                <div class="msg ai welcome-msg">
                    <div class="msg-avatar">🤖</div>
                    <div>
                        <div class="msg-bubble">
                            <h3>👋 Chat Baru!</h3>
                            <p>Siap membantu. Ketik pesan untuk mulai ngobrol.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMessages() {
            const chat = chats.find(c => c.id === activeChat);
            if (!chat || !chat.messages.length) {
                renderWelcome();
                return;
            }
            chatArea.innerHTML = chat.messages.map(m => `
                <div class="msg ${m.role}">
                    <div class="msg-avatar">${m.role === 'user' ? '👤' : '🤖'}</div>
                    <div>
                        <div class="msg-bubble">${formatMessage(m.content)}</div>
                        <div class="msg-time">${new Date(m.time).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                </div>
            `).join('');
            scrollToBottom();
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ===== SEND MESSAGE =====
        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isLoading) return;

            if (!activeChat) {
                createNewChat();
            }

            const chat = chats.find(c => c.id === activeChat);
            if (!chat) return;

            // Add user message
            const userMsg = {
                id: genId(),
                role: 'user',
                content: text,
                time: new Date().toISOString()
            };
            chat.messages.push(userMsg);
            chat.title = chat.title === 'Chat Baru' ? genTitle(text) : chat.title;

            // Clear input
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            // Save & render
            saveAllChats(chats);
            renderChatList();
            renderMessages();

            // Show typing
            isLoading = true;
            typingBox.classList.remove('hidden');
            scrollToBottom();

            try {
                const reply = await askAI(chat.messages);

                const aiMsg = {
                    id: genId(),
                    role: 'ai',
                    content: reply,
                    time: new Date().toISOString()
                };
                chat.messages.push(aiMsg);
                saveAllChats(chats);

            } catch(err) {
                console.error('AI Error:', err);
                chat.messages.push({
                    id: genId(),
                    role: 'ai',
                    content: '❌ Error: ' + err.message + '\n\nCoba lagi nanti.',
                    time: new Date().toISOString()
                });
                saveAllChats(chats);
            } finally {
                isLoading = false;
                typingBox.classList.add('hidden');
                renderMessages();
            }
        }

        // ===== LOGOUT =====
        function doLogout() {
            localStorage.removeItem('rafi_current_user');
            window.location.href = 'login.html';
        }

        // ===== INIT =====
        function init() {
            chats = getAllChats();
            renderChatList();
            if (!chats.length) {
                createNewChat();
            } else {
                activeChat = chats[0].id;
                renderMessages();
            }
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Rafi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <button class="menu-btn" onclick="toggleDrawer()">☰</button>
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <div class="logo-text">
                <h1>Rafi AI</h1>
                <p id="headerStatus">Siap membantu</p>
            </div>
        </div>
        <button class="new-chat-btn" onclick="newChat()">+</button>
    </div>

    <div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>

    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <div class="logo-text">
                    <h1>Rafi AI</h1>
                    <p>AI Chat Assistant</p>
                </div>
            </div>
            <button class="drawer-new-chat" onclick="newChat(); toggleDrawer()">
                <span>+</span> Chat Baru
            </button>
        </div>
        <div class="drawer-body">
            <p class="drawer-section">Riwayat Chat</p>
            <div id="chatList">
                <div class="empty">Belum ada chat. Mulai chat baru!</div>
            </div>
        </div>
        <div class="user-profile">
            <div class="user-avatar">👤</div>
            <div class="user-info">
                <div class="user-name" id="userName">User</div>
                <div class="user-email" id="userEmail">-</div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="chat-area" id="chatArea">
            <div class="message ai" style="align-self:center; text-align:center; margin-top:auto; margin-bottom:auto;">
                <div class="bubble">
                    <p>👋 Halo! Aku <strong>Rafi AI</strong></p>
                    <p style="margin-top:8px;">Bisa bikin kode, ngobrol, atau bantu solve problem.</p>
                    <p style="margin-top:8px; color:var(--muted); font-size:12px;">Ketik pesan di bawah untuk mulai!</p>
                </div>
            </div>
        </div>
        <div class="typing hidden" id="typing">
            <div class="avatar">🤖</div>
            <div class="typing-bubble">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <textarea id="msgInput" rows="1" placeholder="Ketik pesan..."></textarea>
                <button class="send-btn" id="sendBtn" onclick="send()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22,2 15,22 11,13 2,9 22,2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Check login
        const currentUser = JSON.parse(localStorage.getItem('rafi_current_user') || 'null');
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = currentUser?.username || 'User';
        document.getElementById('userEmail').textContent = currentUser?.email || '-';

        let chats = [], activeChat = null, isLoading = false;
        const chatArea = document.getElementById('chatArea');
        const chatList = document.getElementById('chatList');
        const typing = document.getElementById('typing');
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        input.addEventListener('input', () => {
            sendBtn.disabled = !input.value.trim();
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        });

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        function toggleDrawer() {
            document.getElementById('overlay').classList.toggle('open');
            document.getElementById('drawer').classList.toggle('open');
        }

        function logout() {
            localStorage.removeItem('rafi_current_user');
            window.location.href = 'login.html';
        }

        function newChat() {
            const chat = { id: genId(), title: 'Chat Baru', messages: [], time: new Date(), userId: currentUser?.id };
            chats.unshift(chat);
            activeChat = chat.id;
            save();
            renderList();
            chatArea.innerHTML = `
                <div class="message ai" style="align-self:center; text-align:center; margin-top:auto; margin-bottom:auto;">
                    <div class="bubble">
                        <p>👋 Chat baru!</p>
                        <p style="margin-top:8px;">Ketik pesan untuk mulai ngobrol.</p>
                    </div>
                </div>
            `;
            input.focus();
        }

        function selectChat(id) {
            activeChat = id;
            renderList();
            renderMessages();
            if (window.innerWidth < 769) toggleDrawer();
        }

        function delChat(id) {
            chats = chats.filter(c => c.id !== id);
            if (activeChat === id) activeChat = chats[0]?.id || null;
            save(); renderList();
            if (!activeChat) {
                chatArea.innerHTML = `
                    <div class="message ai" style="align-self:center; text-align:center; margin-top:auto; margin-bottom:auto;">
                        <div class="bubble">
                            <p>👋 Halo! Aku <strong>Rafi AI</strong></p>
                            <p style="margin-top:8px;">Bisa bikin kode, ngobrol, atau bantu solve problem.</p>
                        </div>
                    </div>
                `;
            }
        }

        function renderList() {
            if (!chats.length) {
                chatList.innerHTML = '<div class="empty">Belum ada chat. Mulai chat baru!</div>';
                return;
            }
            chatList.innerHTML = chats.map(c => `
                <div class="chat-item ${c.id===activeChat?'active':''}" onclick="selectChat('${c.id}')">
                    <span>💬</span>
                    <span class="title">${esc(c.title)}</span>
                    <button class="delete" onclick="event.stopPropagation();delChat('${c.id}')">🗑️</button>
                </div>
            `).join('');
        }

        function renderMessages() {
            const chat = chats.find(c => c.id === activeChat);
            if (!chat || !chat.messages.length) return;
            chatArea.innerHTML = chat.messages.map(m => `
                <div class="message ${m.role}">
                    <div class="avatar">${m.role==='user'?'👤':'🤖'}</div>
                    <div>
                        <div class="bubble">${fmt(m.content)}</div>
                        <div class="time">${new Date(m.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</div>
                    </div>
                </div>
            `).join('');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function getStorageKey() {
            return 'rafi_chats_' + (currentUser?.id || 'guest');
        }

        function save() {
            localStorage.setItem(getStorageKey(), JSON.stringify(chats));
        }

        function load() {
            const s = localStorage.getItem(getStorageKey());
            if (s) { chats = JSON.parse(s); renderList(); }
        }

        async function send() {
            const text = input.value.trim();
            if (!text || isLoading) return;
            if (!activeChat) newChat();
            const chat = chats.find(c => c.id === activeChat);

            const umsg = { id: genId(), role: 'user', content: text, time: new Date() };
            chat.messages.push(umsg);
            chat.title = chat.title==='Chat Baru' ? genTitle(text) : chat.title;
            input.value = ''; input.style.height = 'auto'; sendBtn.disabled = true;
            save(); renderList(); renderMessages();

            isLoading = true; typing.classList.remove('hidden'); chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: 'Kamu adalah AI Chat Assistant bernama "Rafi AI". Kamu pintar, ramah, dan profesional. Kemampuan: 1. Ngobrol & Chat - Bisa diajak ngobrol santai, diskusi, tanya jawab 2. Coding & Programming - Bikin kode JS, Python, PHP, React, dll. Kode harus clean dan well-commented 3. Problem Solving - Bantu debug error, jelaskan konsep. Rules: - Jawab dalam Bahasa Indonesia kecuali diminta bahasa lain - Untuk kode, pakai markdown code block - Jelaskan kode dengan detail - Selalu ramah dan helpful' },
                            ...chat.messages.map(m => ({ role: m.role==='ai'?'assistant':m.role, content: m.content }))
                        ],
                        temperature: 0.7, max_tokens: 4096
                    })
                });
                if (!res.ok) throw new Error('Gagal response AI');
                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || 'Maaf, saya tidak bisa memproses.';
                chat.messages.push({ id: genId(), role: 'ai', content: reply, time: new Date() });
                save();
            } catch(err) {
                chat.messages.push({ id: genId(), role: 'ai', content: `❌ Error: ${err.message}\n\nCoba lagi nanti.`, time: new Date() });
                save();
            } finally {
                isLoading = false; typing.classList.add('hidden'); renderMessages();
            }
        }

        load();
        if (!chats.length) newChat();
    </script>
</body>
</html>

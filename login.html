<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rafi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <h1>Rafi AI</h1>
            <p>Masuk ke akunmu</p>
        </div>
        <div class="card">
            <h2>Login</h2>
            <div class="error" id="error"></div>
            <div class="form-group">
                <label>Username atau Email</label>
                <input type="text" id="loginInput" placeholder="Username atau email" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password">
            </div>
            <button class="btn" onclick="login()">Masuk</button>
            <div class="link">
                Belum punya akun? <a href="daftar.html">Daftar</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function login() {
            const input = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');

            if (!input || !password) {
                error.textContent = 'Username/email dan password harus diisi!';
                error.style.display = 'block';
                return;
            }

            const users = getUsers();
            const user = users.find(u => (u.username === input || u.email === input) && u.password === password);

            if (!user) {
                error.textContent = 'Username/email atau password salah!';
                error.style.display = 'block';
                return;
            }

            localStorage.setItem('rafi_current_user', JSON.stringify({
                id: user.id,
                username: user.username,
                email: user.email
            }));

            error.style.display = 'none';
            window.location.href = 'dashboard.html';
        }

        if (localStorage.getItem('rafi_current_user')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>

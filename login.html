<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rafi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="icon">🤖</div>
            <h1>Rafi AI</h1>
            <p>Masuk ke akunmu</p>
        </div>
        <div class="auth-card">
            <h2>Login</h2>
            <div class="alert" id="errorBox"></div>
            <div class="form-group">
                <label>Username atau Email</label>
                <input type="text" id="loginInput" placeholder="Username atau email" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password">
            </div>
            <button class="btn-primary" onclick="doLogin()">Masuk</button>
            <div class="auth-link">
                Belum punya akun? <a href="daftar.html">Daftar</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Auto redirect kalau sudah login
        if (getCurrentUser()) {
            window.location.href = 'dashboard.html';
        }

        function doLogin() {
            const input = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');

            if (!input || !password) {
                showError('Username/email dan password harus diisi!');
                return;
            }

            const users = getUsers();
            const user = users.find(u => (u.username === input || u.email === input) && u.password === password);

            if (!user) {
                showError('Username/email atau password salah!');
                return;
            }

            saveCurrentUser({
                id: user.id,
                username: user.username,
                email: user.email
            });

            window.location.href = 'dashboard.html';
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.className = 'alert alert-error';
        }
    </script>
</body>
</html>

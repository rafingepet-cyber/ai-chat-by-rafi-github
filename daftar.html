<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Rafi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="icon">🤖</div>
            <h1>Rafi AI</h1>
            <p>Daftar akun baru</p>
        </div>
        <div class="auth-card">
            <h2>Buat Akun</h2>
            <div class="alert" id="errorBox"></div>
            <div class="alert" id="successBox"></div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Masukkan email" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Minimal 6 karakter">
            </div>
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="confirmPassword" placeholder="Ulangi password">
            </div>
            <button class="btn-primary" onclick="doRegister()">Daftar</button>
            <div class="auth-link">
                Sudah punya akun? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function doRegister() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!username || !email || !password) {
                showError('Semua field harus diisi!');
                return;
            }

            if (password !== confirmPassword) {
                showError('Password tidak cocok!');
                return;
            }

            if (password.length < 6) {
                showError('Password minimal 6 karakter!');
                return;
            }

            const users = getUsers();

            if (users.find(u => u.username === username)) {
                showError('Username sudah digunakan!');
                return;
            }

            if (users.find(u => u.email === email)) {
                showError('Email sudah terdaftar!');
                return;
            }

            const newUser = {
                id: Date.now().toString(36),
                username,
                email,
                password,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            saveUsers(users);

            showSuccess('Akun berhasil dibuat! Redirecting...');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.className = 'alert alert-error';
            document.getElementById('successBox').style.display = 'none';
        }

        function showSuccess(msg) {
            const box = document.getElementById('successBox');
            box.textContent = msg;
            box.className = 'alert alert-success';
            document.getElementById('errorBox').style.display = 'none';
        }
    </script>
</body>
</html>

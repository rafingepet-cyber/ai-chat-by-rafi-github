<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Rafi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <h1>Rafi AI</h1>
            <p>Daftar akun baru</p>
        </div>
        <div class="card">
            <h2>Buat Akun</h2>
            <div class="error" id="error"></div>
            <div class="success" id="success"></div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Masukkan email" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password">
            </div>
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="confirmPassword" placeholder="Ulangi password">
            </div>
            <button class="btn" onclick="daftar()">Daftar</button>
            <div class="link">
                Sudah punya akun? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function daftar() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const error = document.getElementById('error');
            const success = document.getElementById('success');

            if (!username || !email || !password) {
                error.textContent = 'Semua field harus diisi!';
                error.style.display = 'block';
                success.style.display = 'none';
                return;
            }

            if (password !== confirmPassword) {
                error.textContent = 'Password tidak cocok!';
                error.style.display = 'block';
                success.style.display = 'none';
                return;
            }

            if (password.length < 6) {
                error.textContent = 'Password minimal 6 karakter!';
                error.style.display = 'block';
                success.style.display = 'none';
                return;
            }

            const users = getUsers();

            if (users.find(u => u.username === username)) {
                error.textContent = 'Username sudah digunakan!';
                error.style.display = 'block';
                success.style.display = 'none';
                return;
            }

            if (users.find(u => u.email === email)) {
                error.textContent = 'Email sudah terdaftar!';
                error.style.display = 'block';
                success.style.display = 'none';
                return;
            }

            const newUser = {
                id: Date.now().toString(36),
                username,
                email,
                password,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            saveUsers(users);

            error.style.display = 'none';
            success.textContent = 'Akun berhasil dibuat! Redirecting...';
            success.style.display = 'block';

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }
    </script>
</body>
</html>
